version: '3.8'

services:
  backend:
    build:
      context: ../..
      dockerfile: App/docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../../FL-DP-Healthcare:/app/FL-DP-Healthcare
      - ../../App/database:/app/App/database
      - ../../App/uploads:/app/App/uploads
    environment:
      - DEBUG=True
      - DATABASE_URL=sqlite:///./App/database/app.db
    restart: unless-stopped

